<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  body { margin:0; font-family:sans-serif; background:#111; color:#eee; }
  .page { height: 300vh; padding: 20px; }
  .page h1 { position: sticky; top: 0; }
  .fixed-host { position: fixed; inset: 0; z-index: 60; display:flex; align-items:flex-end; justify-content:center; }
  .dim { position:absolute; inset:0; background:rgba(0,0,0,.6); }
  .sheet { position:relative; width:min(420px,92vw); max-height:75vh; margin-bottom:80px;
    background:#1a1a1a; border-radius:24px; overflow:hidden; display:flex; flex-direction:column; border:1px solid #333; }
  .head { padding:16px; flex-shrink:0; }
  .list { overflow-y:auto; flex:1; overscroll-behavior:contain; }
  .item { padding:14px 16px; border-bottom:1px solid #333; }
  #probe { position:fixed; top:8px; left:8px; z-index:99; background:#0a0; color:#000; padding:6px 10px; font:12px mono; }
</style></head>
<body>
<div id="probe">scrollTop=? pageY=?</div>
<div class="page"><h1 id="pageMark">BACKGROUND PAGE (should not move)</h1>
<script>for(let i=0;i<80;i++) document.write('<p>bg line '+i+'</p>');</script>
</div>
<div class="fixed-host" id="host">
  <div class="dim"></div>
  <div class="sheet">
    <div class="head"><h2>Search</h2><input id="q" value="spider man" style="width:90%;padding:10px"/></div>
    <div class="list" id="list">
      <script>for(let i=0;i<40;i++) document.write('<div class="item" data-i="'+i+'">Result '+i+' — Spider-Man item</div>');</script>
    </div>
  </div>
</div>
<script>
const list=document.getElementById('list');
const probe=document.getElementById('probe');
const pageMark=document.getElementById('pageMark');
setInterval(()=>{
  probe.textContent='list.scrollTop='+list.scrollTop+
    ' listSH='+list.scrollHeight+' listCH='+list.clientHeight+
    ' pageY='+window.scrollY+
    ' pageMarkTop='+pageMark.getBoundingClientRect().top.toFixed(0);
}, 100);
window.__keenScrollSnap=()=>({list:list.scrollTop, page:window.scrollY|0, sh:list.scrollHeight, ch:list.clientHeight});
</script>
</body></html>
